# Sobe a aplicação + MySQL com um comando:  docker compose up --build
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: senha
      MYSQL_DATABASE: helpdesk_lite_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psenha"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: change-this-dev-secret-key-with-at-least-32-chars
      DATABASE_URL: mysql+pymysql://root:senha@db:3306/helpdesk_lite_db
      DB_HOST: db
      DB_PORT: "3306"
      SEED_ON_START: "1"
      FLASK_DEBUG: "0"
    ports:
      - "8000:8000"

volumes:
  mysql_data:
